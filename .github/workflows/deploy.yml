name: Deploy to cloudtype
on:
  schedule:
    - cron: '0 20 * * *'
  push:
    branches:
      - main
    workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: extra_bottle/my-project
          stage: main
          yaml: |
            name: clova-iot
            app: node@24
            options:
              ports: 443
              install: npm ci              
              start: npm start
              env:
                - name: KEY_B64
                  secret: KEY_B64 
                - name: CERT_B64
                  secret: CERT_B64
                - name: CA_B64
                  secret: CA_B64                            
                - name: CLIENT_ID
                  secret: CLIENT_ID
                - name: CLOVA_ID
                  secret: CLOVA_ID
                - name: CLOVA_SECRET
                  secret: CLOVA_SECRET                
                - name: FINISH_MSG
                  secret: FINISH_MSG
                - name: ERROR_MSG
                  secret: ERROR_MSG                
                - name: MQTT_HOST
                  secret: MQTT_HOST
                - name: SUB_INBOX
                  secret: SUB_INBOX
                - name: SUB_PUSH
                  secret: SUB_PUSH
                - name: SERVER_PORT
                  secret: SERVER_PORT
                - name: DOMAIN
                  secret: DOMAIN
                - name: CLEANER_MSG
                  secret: CLEANER_MSG
                - name: CONDITIONER_MSG
                  secret: CONDITIONER_MSG
                - name: GEMINI_API_KEY
                  secret: GEMINI_API_KEY
              buildenv: []
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
